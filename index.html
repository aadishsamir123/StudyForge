// ─── FIXED: Call Claude through your backend proxy ───────────────────
async function callClaude(prompt) {
  const loadingTexts = document.querySelectorAll('.loading-text');
  if (loadingTexts.length) {
    loadingTexts.forEach(t => t.textContent = "Thinking...");
  }

  try {
    const response = await fetch('http://localhost:3000/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompt })
    });

    if (!response.ok) {
      throw new Error(`Server error: ${response.status}`);
    }

    const data = await response.json();
    return data.text || "Sorry, I couldn't generate a response.";
  } catch (err) {
    console.error("Backend proxy error:", err);
    return "⚠️ Could not connect to AI. Make sure the backend server is running on port 3000.";
  }
}
