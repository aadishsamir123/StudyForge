name: Sync Upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      upstream_repository:
        description: 'Owner/repo of the source repository to sync from'
        required: false
        default: 'Nithish2012/StudyForge'
        type: string
      upstream_branch:
        description: 'Source branch to sync from'
        required: false
        default: 'main'
        type: string
      target_branch:
        description: 'Target branch in this repository'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPOSITORY: ${{ github.event.inputs.upstream_repository || '' }}
      UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch || 'main' }}
      TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'main' }}
      TARGET_REPO_TOKEN: ${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}
      USING_FALLBACK_TOKEN: ${{ secrets.SYNC_TOKEN == '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate upstream configuration
        run: |
          if [ -z "$UPSTREAM_REPOSITORY" ]; then
            echo "No upstream repository configured. Provide workflow_dispatch input upstream_repository to run sync."
            exit 0
          fi

          if [ "$UPSTREAM_REPOSITORY" = "${{ github.repository }}" ]; then
            echo "UPSTREAM_REPOSITORY cannot be the same as this repository (${{ github.repository }})."
            exit 1
          fi

          if [ "$USING_FALLBACK_TOKEN" = "true" ]; then
            echo "SYNC_TOKEN is not set. Falling back to GITHUB_TOKEN."
            echo "If upstream changes include files under .github/workflows/, create secret SYNC_TOKEN with repo + workflow scopes."
          fi

      - name: Sync with upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          upstream_sync_repo: ${{ env.UPSTREAM_REPOSITORY }}
          upstream_sync_branch: ${{ env.UPSTREAM_BRANCH }}
          target_sync_branch: ${{ env.TARGET_BRANCH }}
          target_repo_token: ${{ env.TARGET_REPO_TOKEN }}
